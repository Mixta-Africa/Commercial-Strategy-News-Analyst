name: Daily News Pipeline

on:
  schedule:
    # 8:00 AM Lagos time (WAT = UTC+1) -> 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:        # allows manual "Run workflow" button

permissions:
  contents: write           # needed to commit dashboard data back to repo

jobs:
  news-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # ---------------------------------------------------------------
      # API KEY TEST (current models, June 2026)
      # This step is independent of src/agents.js - it has its own
      # model names, so keep them in sync with agents.js.
      # ---------------------------------------------------------------
      - name: Test API Keys
        run: |
          npm install axios
          cat > test-apis.js << 'SCRIPT'
          const axios = require('axios');

          async function testGroq() {
            return axios.post('https://api.groq.com/openai/v1/chat/completions', {
              model: 'llama-3.3-70b-versatile',
              messages: [{ role: 'user', content: 'Say OK' }],
              max_tokens: 5,
            }, {
              headers: {
                'Authorization': `Bearer ${process.env.GROQ_API_KEY}`,
                'Content-Type': 'application/json',
              },
              timeout: 10000,
            });
          }

          async function testCerebras() {
            return axios.post('https://api.cerebras.ai/v1/chat/completions', {
              model: 'llama-3.3-70b',
              messages: [{ role: 'user', content: 'Say OK' }],
              max_tokens: 5,
            }, {
              headers: {
                'Authorization': `Bearer ${process.env.CEREBRAS_API_KEY}`,
                'Content-Type': 'application/json',
              },
              timeout: 10000,
            });
          }

          async function testGemini() {
            const models = ['gemini-3.5-flash', 'gemini-2.5-flash', 'gemini-2.5-flash-lite'];
            let lastErr;
            for (const m of models) {
              try {
                await axios.post(
                  `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent`,
                  { contents: [{ parts: [{ text: 'Say OK' }] }], generationConfig: { maxOutputTokens: 5 } },
                  { headers: { 'Content-Type': 'application/json', 'x-goog-api-key': process.env.GEMINI_API_KEY }, timeout: 10000 }
                );
                return m;
              } catch (e) {
                lastErr = e;
                if (e.response?.status && e.response.status !== 404) throw e;
              }
            }
            throw lastErr;
          }

          async function run(name, key, fn) {
            if (!key) { console.log(`\u274c ${name}: KEY NOT SET`); return; }
            try {
              const result = await fn();
              const extra = typeof result === 'string' ? ` (model: ${result})` : '';
              console.log(`\u2705 ${name}: WORKING${extra}`);
            } catch (e) {
              const status = e.response?.status || e.code || 'UNKNOWN';
              const msg = (e.response?.data?.error?.message || e.message || '').substring(0, 70);
              console.log(`\u274c ${name}: ${status} - ${msg}`);
            }
          }

          (async () => {
            console.log('\n' + '='.repeat(60));
            console.log('API KEY TEST');
            console.log('='.repeat(60));
            await run('Groq', process.env.GROQ_API_KEY, testGroq);
            await run('Cerebras', process.env.CEREBRAS_API_KEY, testCerebras);
            await run('Gemini', process.env.GEMINI_API_KEY, testGemini);
            console.log('='.repeat(60) + '\n');
          })();
          SCRIPT

          node test-apis.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      # ---------------------------------------------------------------
      # MAIN PIPELINE
      # ---------------------------------------------------------------
      - name: Run news pipeline
        run: npm run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}

      # ---------------------------------------------------------------
      # COMMIT DASHBOARD DATA BACK TO REPO (for GitHub Pages)
      # ---------------------------------------------------------------
      - name: Commit dashboard data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update dashboard data [skip ci]"
            git push
          fi
