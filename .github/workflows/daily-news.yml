# Add this section to .github/workflows/daily-news.yml
# Insert it BEFORE the "Run npm run pipeline" step

# Full workflow context:
name: Daily News Pipeline

on:
  schedule:
    - cron: '0 8 * * *'  # 8am Lagos time
  workflow_dispatch:

jobs:
  news-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      # ADD THIS NEW STEP - API Key Testing
      - name: Test API Keys
        run: |
          npm install axios
          cat > test-apis.js << 'EOF'
          const axios = require('axios');
          
          const apis = {
            groq: {
              name: 'Groq',
              url: 'https://api.groq.com/openai/v1/chat/completions',
              key: process.env.GROQ_API_KEY,
              call: async function() {
                return axios.post(this.url, {
                  model: 'mixtral-8x7b-32768',
                  messages: [{ role: 'user', content: 'Say OK' }],
                  max_tokens: 5,
                }, {
                  headers: {
                    'Authorization': `Bearer ${this.key}`,
                    'Content-Type': 'application/json'
                  },
                  timeout: 10000,
                });
              }
            },
            cerebras: {
              name: 'Cerebras',
              url: 'https://api.cerebras.ai/v1/chat/completions',
              key: process.env.CEREBRAS_API_KEY,
              call: async function() {
                return axios.post(this.url, {
                  model: 'llama-3.1-8b',
                  messages: [{ role: 'user', content: 'Say OK' }],
                  max_tokens: 5,
                }, {
                  headers: {
                    'Authorization': `Bearer ${this.key}`,
                    'Content-Type': 'application/json'
                  },
                  timeout: 10000,
                });
              }
            },
            gemini: {
              name: 'Gemini',
              url: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',
              key: process.env.GEMINI_API_KEY,
              call: async function() {
                return axios.post(this.url + `?key=${this.key}`, {
                  contents: [{
                    parts: [{ text: 'Say OK' }],
                  }],
                  generationConfig: {
                    maxOutputTokens: 5,
                  },
                }, {
                  timeout: 10000,
                });
              }
            }
          };
          
          async function test() {
            console.log('\n' + '='.repeat(60));
            console.log('API KEY TEST');
            console.log('='.repeat(60));
            
            for (const [key, api] of Object.entries(apis)) {
              if (!api.key) {
                console.log(`❌ ${api.name}: KEY NOT SET`);
                continue;
              }
              
              try {
                await api.call();
                console.log(`✅ ${api.name}: WORKING`);
              } catch (error) {
                const status = error.response?.status || error.code || 'UNKNOWN';
                const msg = error.response?.data?.error?.message || error.message;
                console.log(`❌ ${api.name}: ${status} - ${msg.substring(0, 60)}`);
              }
            }
            console.log('='.repeat(60) + '\n');
          }
          
          test();
          EOF
          
          node test-apis.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true
      
      # THIS IS YOUR EXISTING STEP (don't change this)
      - name: Run npm run pipeline
        run: npm run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
