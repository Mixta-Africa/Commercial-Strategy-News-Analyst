name: Daily News Pipeline

on:
  schedule:
    # 8:00 AM Lagos time (WAT = UTC+1) -> 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # ---------------------------------------------------------------
      # PROVIDER HEALTH CHECK
      # Tests all 5 providers + both Groq models.
      # Kept in sync with agents.js: any model change there must be
      # reflected here. continue-on-error: true so a failed key never
      # blocks the pipeline from running.
      # ---------------------------------------------------------------
      - name: Test all AI providers
        run: |
          npm install axios
          node - << 'SCRIPT'
          const axios = require('axios');
          const TIMEOUT = 10000;

          const tests = [
            {
              name: 'Groq-8b (llama-3.1-8b-instant)',
              key: process.env.GROQ_API_KEY,
              fn: async (key) => {
                const r = await axios.post('https://api.groq.com/openai/v1/chat/completions',
                  { model: 'llama-3.1-8b-instant', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: TIMEOUT });
                return `${r.data.choices[0]?.message?.content?.trim()} | RPD bucket: 14,400`;
              }
            },
            {
              name: 'Groq-70b (llama-3.3-70b-versatile)',
              key: process.env.GROQ_API_KEY,
              fn: async (key) => {
                const r = await axios.post('https://api.groq.com/openai/v1/chat/completions',
                  { model: 'llama-3.3-70b-versatile', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: TIMEOUT });
                return `${r.data.choices[0]?.message?.content?.trim()} | RPD bucket: 1,000`;
              }
            },
            {
              name: 'Gemini (v1beta auto-model)',
              key: process.env.GEMINI_API_KEY,
              fn: async (key) => {
                const models = ['gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-1.5-flash'];
                for (const m of models) {
                  try {
                    const r = await axios.post(
                      `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent`,
                      { contents: [{ parts: [{ text: 'Say OK' }] }], generationConfig: { maxOutputTokens: 5 } },
                      { headers: { 'Content-Type': 'application/json', 'x-goog-api-key': key }, timeout: TIMEOUT });
                    const text = r.data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                    return `${text} | model: ${m}`;
                  } catch (e) {
                    if (e.response?.status !== 404) throw e;
                  }
                }
                throw new Error('No Gemini model available');
              }
            },
            {
              name: 'SambaNova (Meta-Llama-3.3-70B-Instruct)',
              key: process.env.SAMBANOVA_API_KEY,
              fn: async (key) => {
                const r = await axios.post('https://api.sambanova.ai/v1/chat/completions',
                  { model: 'Meta-Llama-3.3-70B-Instruct', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: TIMEOUT });
                return r.data.choices[0]?.message?.content?.trim();
              }
            },
            {
              name: 'Mistral (mistral-small-latest)',
              key: process.env.MISTRAL_API_KEY,
              fn: async (key) => {
                const r = await axios.post('https://api.mistral.ai/v1/chat/completions',
                  { model: 'mistral-small-latest', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' }, timeout: TIMEOUT });
                return r.data.choices[0]?.message?.content?.trim();
              }
            },
            {
              name: 'OpenRouter (deepseek-r1:free)',
              key: process.env.OPENROUTER_API_KEY,
              fn: async (key) => {
                const r = await axios.post('https://openrouter.ai/api/v1/chat/completions',
                  { model: 'deepseek/deepseek-r1:free', messages: [{ role: 'user', content: 'Say OK' }], max_tokens: 5 },
                  { headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json', 'HTTP-Referer': 'https://github.com/mixta-africa', 'X-Title': 'Mixta News Pipeline' }, timeout: TIMEOUT });
                return r.data.choices[0]?.message?.content?.trim();
              }
            },
          ];

          (async () => {
            console.log('\n' + '='.repeat(64));
            console.log('AI PROVIDER HEALTH CHECK — all 5 providers, both Groq models');
            console.log('='.repeat(64));
            let working = 0;
            for (const t of tests) {
              if (!t.key) { console.log(`  SKIP   ${t.name} — key not set in GitHub Secrets`); continue; }
              try {
                const detail = await t.fn(t.key);
                console.log(`  PASS   ${t.name} — ${detail || 'OK'}`);
                working++;
              } catch (e) {
                const code = e.response?.status || e.code || 'ERR';
                const msg = (e.response?.data?.error?.message || e.message || '').substring(0, 80);
                console.log(`  FAIL   ${t.name} — ${code}: ${msg}`);
              }
            }
            console.log('='.repeat(64));
            console.log(`  ${working}/${tests.filter(t => t.key).length} providers working`);
            console.log('='.repeat(64) + '\n');
          })();
          SCRIPT
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true

      # ---------------------------------------------------------------
      # MAIN PIPELINE — all 5 provider keys injected
      # ---------------------------------------------------------------
      - name: Run news pipeline
        run: npm run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      # ---------------------------------------------------------------
      # COMMIT DASHBOARD DATA BACK TO REPO (for GitHub Pages)
      # ---------------------------------------------------------------
      - name: Commit dashboard data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update dashboard data [skip ci]"
            git push
          fi
